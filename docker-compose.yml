services:
  pokedex:
    build: .
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - LOG_LEVEL=debug
      - POKEAPI_BASE_URL=https://pokeapi.co
      - TRANSLATIONS_BASE_URL=https://funtranslations.mercxry.me
      - HTTP_TIMEOUT=10s
      - CACHE_TTL=5m
      - RATE_LIMIT_RPS=10
